<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>内容浏览</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lark: {
                            blue: '#C8161D',
                            text: '#1F2329',
                            desc: '#646A73',
                            bg: '#FDEBEC',
                            border: '#E5E6EB',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: #FFFFFF;
            color: #1F2329;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .banner-dot {
            transition: all 0.3s ease;
        }
        .banner-dot.active {
            width: 16px;
            background-color: #C8161D;
            border-radius: 4px;
        }
        .tab-underline {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Toast 动画 */
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            10% { opacity: 1; transform: translate(-50%, 0); }
            90% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }
        .toast-active {
            animation: fadeInOut 4s forwards;
        }
    </style>
</head>
<body class="bg-white min-h-screen">

    <div id="app" class="max-w-md mx-auto relative min-h-screen flex flex-col">
        <!-- Toast 提示框 -->
        <div id="toast" class="fixed left-1/2 -translate-x-1/2 bottom-24 z-50 w-[85%] bg-black/80 text-white px-5 py-4 rounded-xl text-xs leading-relaxed text-center hidden pointer-events-none">
            为了绝对保护链主的权益，平台不提供不推荐分享二维码，注册用户须自行与链主联系获得分享二维码，并支付费用成为链主，方有权限
        </div>

        <!-- 1. 顶部 Banner -->
        <div class="relative w-full aspect-[21/9] overflow-hidden bg-gray-100 mt-2 px-4">
            <div id="banner-container" class="w-full h-full rounded-xl overflow-hidden relative shadow-sm">
                <div id="banner-track" class="flex transition-transform duration-500 ease-out h-full">
                    <div class="min-w-full h-full relative">
                        <img src="https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Banner 1">
                        <div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/60 to-transparent text-white text-sm font-medium">
                            公益计划：为爱连接未来
                        </div>
                    </div>
                    <div class="min-w-full h-full relative">
                        <img src="https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover" alt="Banner 2">
                        <div class="absolute bottom-0 left-0 right-0 p-3 bg-gradient-to-t from-black/60 to-transparent text-white text-sm font-medium">
                            企业数字化转型战略解读
                        </div>
                    </div>
                </div>
                <div class="absolute bottom-2 right-3 flex space-x-1.5" id="banner-dots">
                    <span class="banner-dot active h-1.5 w-1.5 bg-white/60 rounded-full"></span>
                    <span class="banner-dot h-1.5 w-1.5 bg-white/60 rounded-full"></span>
                </div>
            </div>
        </div>

        <!-- 2. Tab 切换 (公益排第一) -->
        <div class="sticky top-0 z-10 bg-white border-b border-lark-border mt-4">
            <div class="flex items-center w-full">
                <div onclick="handleTabClick('public')" class="tab-item flex-1 py-3 flex flex-col items-center justify-center relative cursor-pointer text-lark-blue font-medium transition-colors" id="tab-public">
                    <span class="text-sm">公益</span>
                    <div class="absolute bottom-0 w-8 h-0.5 bg-lark-blue rounded-full tab-underline"></div>
                </div>
                <div onclick="handleTabClick('enterprise')" class="tab-item flex-1 py-3 flex flex-col items-center justify-center relative cursor-pointer text-lark-desc transition-colors" id="tab-enterprise">
                    <span class="text-sm">进企业</span>
                </div>
                <div onclick="handleTabClick('party')" class="tab-item flex-1 py-3 flex flex-col items-center justify-center relative cursor-pointer text-lark-desc transition-colors" id="tab-party">
                    <span class="text-sm">党建</span>
                </div>
                <div onclick="handleTabClick('family')" class="tab-item flex-1 py-3 flex flex-col items-center justify-center relative cursor-pointer text-lark-desc transition-colors" id="tab-family">
                    <span class="text-sm">进家庭</span>
                </div>
            </div>
        </div>

        <!-- 3. 内容区 -->
        <div id="content-area" class="flex-1 p-4">
            <div id="list-container" class="space-y-6">
                <!-- 初始渲染公益内容 -->
            </div>
        </div>
    </div>

    <script>
        const MOCK_DATA = {
            public: [
                { id: 1, title: '【公益】偏远地区数字化教育普及计划', desc: '为大山里的孩子打开连接世界的窗口。', views: '4.2w', time: '10-18', cover: 'https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?auto=format&fit=crop&q=80&w=800' },
                { id: 2, title: '绿色低碳生活：企业员工的减碳手册', desc: '从身边的每一件小事开始保护地球。', views: '1.8w', time: '10-15', cover: 'https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?auto=format&fit=crop&q=80&w=800' }
            ],
            // 其他受限数据
            enterprise: [],
            party: [],
            family: []
        };

        let currentTab = 'public';
        const isLinkMaster = false; // 默认不是链主

        // --- Banner ---
        let currentBannerIdx = 0;
        const bannerTrack = document.getElementById('banner-track');
        const dots = document.querySelectorAll('.banner-dot');
        setInterval(() => {
            currentBannerIdx = (currentBannerIdx + 1) % 2;
            bannerTrack.style.transform = `translateX(-${currentBannerIdx * 100}%)`;
            dots.forEach((dot, idx) => dot.classList.toggle('active', idx === currentBannerIdx));
        }, 4000);

        // --- Toast ---
        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('hidden', 'toast-active');
            void toast.offsetWidth; // 触发重绘
            toast.classList.add('toast-active');
            setTimeout(() => toast.classList.add('hidden'), 4000);
        }

        // --- Tab Click Handler ---
        function handleTabClick(tabId) {
            // 权限判断逻辑
            if (tabId !== 'public' && !isLinkMaster) {
                showToast();
                return; // 不切换 Tab 内容，直接拦截
            }

            // 切换 UI 状态 (只有允许访问时才执行)
            currentTab = tabId;
            const tabs = document.querySelectorAll('.tab-item');
            tabs.forEach(t => {
                t.classList.remove('text-lark-blue', 'font-medium');
                t.classList.add('text-lark-desc');
                const line = t.querySelector('.tab-underline');
                if(line) line.remove();
            });

            const activeTab = document.getElementById(`tab-${tabId}`);
            activeTab.classList.add('text-lark-blue', 'font-medium');
            activeTab.classList.remove('text-lark-desc');
            activeTab.innerHTML += '<div class="absolute bottom-0 w-8 h-0.5 bg-lark-blue rounded-full tab-underline"></div>';

            renderList();
        }

        // --- Render ---
        function renderList() {
            const container = document.getElementById('list-container');
            const data = MOCK_DATA[currentTab] || [];
            
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="py-20 flex flex-col items-center justify-center text-lark-desc">
                        <div class="w-16 h-16 bg-lark-bg rounded-full flex items-center justify-center mb-4">
                            <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                            </svg>
                        </div>
                        <p class="text-sm">内容受限，请联系链主</p>
                    </div>`;
                return;
            }

            container.innerHTML = data.map(item => `
                <div class="group cursor-pointer active:opacity-70 transition" onclick="console.log('Navigate')">
                    <div class="relative w-full aspect-[16/9] bg-lark-bg rounded-xl overflow-hidden mb-3">
                        <img src="${item.cover}" class="w-full h-full object-cover" alt="Cover">
                        <div class="absolute inset-0 flex items-center justify-center bg-black/5">
                             <div class="w-10 h-10 bg-white/90 rounded-full flex items-center justify-center shadow-sm">
                                <svg class="w-5 h-5 text-lark-blue ml-1" fill="currentColor" viewBox="0 0 20 20">
                                    <path d="M4.516 3.248a.5.5 0 01.484.01l11 7a.5.5 0 010 .884l-11 7A.5.5 0 014 17.7V3.7a.5.5 0 01.516-.452z" />
                                </svg>
                             </div>
                        </div>
                    </div>
                    <div class="px-0.5">
                        <h3 class="text-[15px] font-medium text-lark-text line-clamp-2 leading-snug mb-1">
                            ${item.title}
                        </h3>
                        <p class="text-[12px] text-lark-desc line-clamp-2 leading-relaxed mb-2">
                            ${item.desc}
                        </p>
                        <div class="flex items-center text-[11px] text-lark-desc space-x-3">
                            <span class="flex items-center">
                                <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                ${item.views}
                            </span>
                            <span>${item.time} 发布</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = renderList;
    </script>
</body>
</html>
